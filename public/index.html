<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consulta de Saldo</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; }
        .box { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; }
        #res { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Consulta de Saldo</h3>
        <input type="text" id="card" placeholder="16 dígitos" maxlength="16">
        <button onclick="consultar()">CONSULTAR</button>
        <div id="res"></div>
    </div>

    <script>
        async function consultar() {
            const card = document.getElementById('card').value;
            const res = document.getElementById('res');
            res.innerText = "Consultando...";
            try {
                const response = await fetch('/api/consultar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cardNumber: card })
                });
                const data = await response.json();
                
                // AQUÍ ESTABA EL BUG. Cambiamos balancePeso por availablePurchase
                res.innerText = data.status ? "Saldo: $" + data.balance.availablePurchase : "Error: Tarjeta no encontrada";
                
            } catch (e) { 
                res.innerText = "Error de conexión"; 
            }
        }
    </script>
</body>
</html>
